<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;700&display=swap');
    :root {
      --bg-overlay: rgba(8, 10, 19, 0.78);
      --panel: rgba(17, 22, 38, 0.86);
      --panel-border: rgba(225, 188, 99, 0.45);
      --text-main: #f5f2e8;
      --text-soft: #c4bba2;
      --accent: #e1bc63;
      --accent-2: #7a5b23;
      --danger: #ff8a8a;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family:'Inter',sans-serif; color:var(--text-main); background:linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('../../media/background/lapse-background-4.png') center/cover fixed; padding: 16px; }
    button,input,select,textarea { font: inherit; }
    button { border:0; border-radius:8px; padding:9px 12px; cursor:pointer; background: linear-gradient(180deg,#efce7f 0%,#c89940 100%); color:#1a1208; font-family:'Cinzel',serif; font-weight:700; }
    input,select,textarea { width:100%; border:1px solid rgba(255,255,255,.2); border-radius:8px; padding:8px; background: rgba(4,8,18,.7); color:var(--text-main); }
    textarea { min-height: 72px; }
    .error { color:var(--danger); font-size:.9rem; min-height:18px; }
    .container { max-width: 1440px; margin:0 auto; }
    header { display:flex; justify-content:space-between; align-items:center; gap:14px; margin-bottom:14px; background:var(--panel); border:1px solid var(--panel-border); border-radius:12px; padding:12px; }
    h1 { margin:0; color:var(--accent); font-family:'Cinzel',serif; font-size:1.4rem; }
    .header-actions { display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end; }
    .tabs { display:flex; gap:8px; margin-bottom:12px; }
    .tab { opacity:.75; }
    .tab.active { opacity:1; outline:2px solid var(--accent-2); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .panel-layout { display:grid; grid-template-columns: 280px 1fr; gap:12px; }
    .entity-list, .editor-panel, .passwords-section { background:var(--panel); border:1px solid var(--panel-border); border-radius:12px; padding:12px; }
    ul { list-style:none; margin:10px 0; padding:0; max-height:70vh; overflow:auto; }
    li { padding:8px; border-radius:6px; cursor:pointer; border:1px solid transparent; }
    li.active { border-color:var(--accent); background: rgba(225,188,99,.12); }
    li.dirty::after { content:' *'; color: var(--accent); font-weight:700; }
    .section { border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:10px; margin-bottom:10px; }
    .section h3 { margin:0 0 8px; color:var(--accent); font-family:'Cinzel',serif; }
    .grid { display:grid; gap:8px; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); }
    .field small { color: var(--text-soft); display:block; margin-bottom:2px; }
    .line { display:flex; gap:8px; align-items:center; }
    .line > * { flex:1; }
    .line button { flex: 0 0 auto; }
    .pericia-group,.subataque-item,.habilidade-body { border:1px solid rgba(255,255,255,.1); border-radius:8px; padding:8px; margin-top:8px; }
    details summary { cursor:pointer; color: var(--accent); font-weight:700; display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .habilidade-controls button { padding:2px 8px; font-size:.8rem; }
    table { width:100%; border-collapse: collapse; margin-bottom:18px; }
    th,td { border:1px solid rgba(255,255,255,.18); padding:8px; text-align:left; }
    .saved-tag { color: #96f3a0; font-weight:700; margin-left:8px; opacity:0; transition:opacity .2s; }
    .saved-tag.show { opacity:1; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.55); display:grid; place-items:center; padding:16px; }
    .modal.hidden { display:none; }
    .modal-inner { width:min(1000px, 100%); background:var(--panel); border:1px solid var(--panel-border); border-radius:12px; padding:12px; }
    #modal-content { min-height: 60vh; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:8px; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Painel Admin — Lapse</h1>
    <div class="header-actions">
      <button id="btn-export-chars">Exportar Characters JS</button>
      <button id="btn-export-npcs">Exportar NPCs JS</button>
      <button id="btn-export-passwords">Exportar Senhas JS</button>
      <button id="btn-logout">Sair</button>
    </div>
  </header>

  <nav class="tabs">
    <button data-tab="characters" class="tab active">Personagens</button>
    <button data-tab="npcs" class="tab">NPCs</button>
    <button data-tab="passwords" class="tab">Senhas</button>
  </nav>

  <main>
    <div id="tab-characters" class="tab-panel active"></div>
    <div id="tab-npcs" class="tab-panel"></div>
    <div id="tab-passwords" class="tab-panel"></div>
  </main>
</div>

<div id="modal-export" class="modal hidden">
  <div class="modal-inner">
    <h2 id="modal-title"></h2>
    <textarea id="modal-content" readonly spellcheck="false" wrap="off"></textarea>
    <div class="modal-actions">
      <button id="btn-copy">Copiar</button>
      <button id="btn-close-modal">Fechar</button>
    </div>
  </div>
</div>

const normalize = (s='') => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').trim();
const hash = async (s) => {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(normalize(s)));
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2,'0')).join('');
};

function calcPv(entity, isNpc) {
  const formulasPV = { tanque: { pvInicial: 15, pvPorNivel: 8 }, lutador: { pvInicial: 13, pvPorNivel: 7 }, cacador: { pvInicial: 10, pvPorNivel: 6 }, feiticeiro: { pvInicial: 8, pvPorNivel: 4 }, genio: { pvInicial: 7, pvPorNivel: 3 } };
  const arq = normalize(entity?.info?.arquetipo);
  const f = formulasPV[arq];
  if (!f) return Number(entity?.atributos?.[0]?.pv) || 0;
  const nivel = Number(entity?.info?.nivel) || 0;
  const vig = entity?.atributos?.find((a) => a.sigla === 'VIG') || {};
  const vigor = Number(vig.valor) || 0;
  const prestigioVigor = Math.max(1, Number(vig.prestigio) || 1);
  return isNpc
    ? f.pvInicial + (f.pvPorNivel * nivel) + vigor + (prestigioVigor * 10)
    : f.pvInicial + (f.pvPorNivel * nivel) + (vigor * prestigioVigor);
}

function serializeJS(value, indent = 0) {
  const sp = ' '.repeat(indent);
  const next = ' '.repeat(indent + 4);
  if (value === null || value === undefined) return 'undefined';
  if (typeof value === 'string') {
    if (value.includes('\n')) return `\`${value.replace(/`/g, '\\`')}\``;
    return `'${value.replace(/\\/g, '\\\\').replace(/'/g, "\\'")}'`;
  }
  if (typeof value === 'number' || typeof value === 'boolean') return String(value);
  if (Array.isArray(value)) {
    const filtered = value.filter((v) => v !== undefined && v !== null && !(Array.isArray(v) && v.length === 0) && v !== '');
    if (filtered.length === 0) return '[]';
    const prim = filtered.every((v) => ['string','number','boolean'].includes(typeof v));
    if (prim) return `[${filtered.map((v) => serializeJS(v, 0)).join(', ')}]`;
    return `[\n${filtered.map((v) => `${next}${serializeJS(v, indent + 4)}`).join(',\n')}\n${sp}]`;
  }
  if (typeof value === 'object') {
    const entries = Object.entries(value).filter(([k,v]) => {
      if (v === undefined || v === null || v === '') return false;
      if (Array.isArray(v) && v.length === 0) return false;
      if (k === 'dano' && !v) return false;
      if (k === 'calculoDano' && !v?.atributo) return false;
      return true;
    });
    if (!entries.length) return '{}';
    return `{\n${entries.map(([k,v]) => `${next}${k}: ${serializeJS(v, indent + 4)}`).join(',\n')}\n${sp}}`;
  }
  return 'undefined';
}

function renderEntityTab(type) {
  const isNpc = type === 'npcs';
  const dataSet = state[type];
  const selectedKey = isNpc ? state.selectedNpc : state.selectedChar;
  const dirtySet = isNpc ? dirtyNpcs : dirtyChars;
  const panel = document.getElementById(`tab-${type}`);
  const listId = isNpc ? 'npc-list' : 'char-list';
  const newBtnId = isNpc ? 'btn-new-npc' : 'btn-new-char';
  const delBtnId = isNpc ? 'btn-delete-npc' : 'btn-delete-char';
  const editorId = isNpc ? 'npc-editor' : 'char-editor';
  panel.innerHTML = `<div class="panel-layout"><aside class="entity-list"><button id="${newBtnId}">+ Novo ${isNpc ? 'NPC' : 'Personagem'}</button><p class="error" id="${type}-inline-error"></p><ul id="${listId}"></ul><button id="${delBtnId}">🗑 Deletar Selecionado</button></aside><section id="${editorId}" class="editor-panel"></section></div>`;

  const ul = panel.querySelector(`#${listId}`);
  Object.keys(dataSet).forEach((key) => {
    const li = document.createElement('li');
    li.textContent = key;
    li.classList.toggle('active', key === selectedKey);
    li.classList.toggle('dirty', dirtySet.has(key));
    li.addEventListener('click', () => {
      if (isNpc) state.selectedNpc = key; else state.selectedChar = key;
      renderEntityTab(type);
    });
    ul.appendChild(li);
  });

  panel.querySelector(`#${newBtnId}`).addEventListener('click', () => {
    const nm = window.prompt('nome_data do novo personagem:');
    if (!nm) return;
    const err = panel.querySelector(`#${type}-inline-error`);
    if (!/^[a-z0-9_-]+$/.test(nm)) { err.textContent = 'nome_data inválido. Use apenas letras minúsculas, números, _ e -.'; return; }
    if (dataSet[nm]) { err.textContent = 'nome_data já existe.'; return; }
    err.textContent = '';
    dataSet[nm] = entityTemplate(nm);
    if (isNpc) state.selectedNpc = nm; else state.selectedChar = nm;
    renderEntityTab(type);
  });

  panel.querySelector(`#${delBtnId}`).addEventListener('click', () => {
    const sel = isNpc ? state.selectedNpc : state.selectedChar;
    if (!sel) return;
    if (!confirm('Deletar ' + sel + '? Esta ação não pode ser desfeita.')) return;
    delete dataSet[sel];
    if (isNpc) state.selectedNpc = null; else state.selectedChar = null;
    dirtySet.delete(sel);
    renderEntityTab(type);
  });

  const ed = panel.querySelector(`#${editorId}`);
  if (!selectedKey || !dataSet[selectedKey]) { ed.innerHTML = '<p>Selecione um item para editar.</p>'; return; }
  const entity = dataSet[selectedKey];
  ed.innerHTML = buildEditorHtml(entity, isNpc);
  bindEditorEvents(ed, entity, type, selectedKey);
}

nput data-sf="dano" value="${(s.dano||'').replace(/"/g,'&quot;')}"></div><div class="field"><small>Calc. Atributo</small><select data-sf="calcAtributo"><option value="">— nenhum —</option>${['FOR','VIG','AGL','INT','ESP','MAG'].map((sig)=>`<option value="${sig}" ${s?.calculoDano?.atributo===sig?'selected':''}>${sig}</option>`).join('')}</select></div><div class="field"><small>Calc. Perícia</small><input data-sf="calcPericia" value="${(s?.calculoDano?.pericia||'').replace(/"/g,'&quot;')}"></div></div><div class="field"><small>Descrição</small><textarea data-sf="descricao" rows="3">${s.descricao||''}</textarea></div><div class="field"><small>Efeitos</small><input data-sf="efeitos" value="${Array.isArray(s.efeitos)?s.efeitos.join(', '):(s.efeitos||'')}"></div><button class="btn-remove-subataque">✕ Remover</button></div>`).join('')}</div></div></details>`).join('');

function markDirty(type, key) {
  (type === 'npcs' ? dirtyNpcs : dirtyChars).add(key);
}

function bindEditorEvents(editor, entity, type, key) {
  const isNpc = type === 'npcs';
  const rerender = () => renderEntityTab(type);
  editor.querySelectorAll('[data-info]').forEach((el) => el.addEventListener('input', () => {
    const field = el.dataset.info;
    entity.info[field] = ['nivel','xp','inspiracao','altura','peso'].includes(field) ? (el.value === '' ? 0 : Number(el.value)) : el.value;
    if (field === 'nivel') updatePvDisplay();
    markDirty(type, key); renderEntityTab(type);
  }));
  const arqSel = editor.querySelector('#arquetipo-select');
  const arqOutro = editor.querySelector('#arquetipo-outro');
  arqSel?.addEventListener('change', () => {
    entity.info.arquetipo = arqSel.value === '__outro__' ? (arqOutro?.value || '') : arqSel.value;
    markDirty(type, key); rerender();
  });
  arqOutro?.addEventListener('input', () => { entity.info.arquetipo = arqOutro.value; updatePvDisplay(); markDirty(type, key); });
  const pvOverride = editor.querySelector('#pv-override');
  const pvManual = editor.querySelector('#pv-manual');
  const psInput = editor.querySelector('#ps-input');
  pvOverride?.addEventListener('change', () => { pvManual.disabled = !pvOverride.checked; if (!pvOverride.checked) entity.atributos[0].pv = calcPv(entity, isNpc); markDirty(type,key); });
  pvManual?.addEventListener('input', () => { entity.atributos[0].pv = Number(pvManual.value) || 0; markDirty(type,key); });
  psInput?.addEventListener('input', () => { entity.atributos[0].ps = psInput.value; markDirty(type,key); });

  editor.querySelectorAll('[data-ai]').forEach((row) => {
    const ai = Number(row.dataset.ai);
    row.querySelectorAll('[data-af]').forEach((inp) => inp.addEventListener('input', () => {
      const field = inp.dataset.af;
      if (inp.value === '') delete entity.atributos[ai][field]; else entity.atributos[ai][field] = Number(inp.value);
      updatePvDisplay(); markDirty(type,key);
    }));
  });

  function updatePvDisplay() {
    const v = calcPv(entity, isNpc);
    editor.querySelector('#pv-calc').textContent = String(v);
    if (!pvOverride.checked) entity.atributos[0].pv = v;
  }

  editor.querySelector('#btn-add-pericia-group')?.addEventListener('click', () => { entity.pericias.push({ atributo:'FOR', pericia_valor:[] }); markDirty(type,key); rerender(); });
  editor.querySelectorAll('.pericia-group').forEach((grpEl) => {
    const gi = Number(grpEl.dataset.gi);
    grpEl.querySelector('.pericia-atributo')?.addEventListener('change', (e) => { entity.pericias[gi].atributo = e.target.value; markDirty(type,key); });
    grpEl.querySelector('.btn-remove-group')?.addEventListener('click', () => { entity.pericias.splice(gi,1); markDirty(type,key); rerender(); });
    grpEl.querySelector('.btn-add-pericia')?.addEventListener('click', () => { entity.pericias[gi].pericia_valor.push({ nome:'', valor:0 }); markDirty(type,key); rerender(); });
    grpEl.querySelectorAll('.pericia-row').forEach((row) => {
      const pi = Number(row.dataset.pi);
      row.querySelector('.btn-remove-pericia')?.addEventListener('click', () => { entity.pericias[gi].pericia_valor.splice(pi,1); markDirty(type,key); rerender(); });
      row.querySelectorAll('input').forEach((input) => input.addEventListener('input', () => {
        const field = input.dataset.field;
        if (field === 'nome') entity.pericias[gi].pericia_valor[pi].nome = input.value;
        else if (input.value === '') delete entity.pericias[gi].pericia_valor[pi][field];
        else entity.pericias[gi].pericia_valor[pi][field] = Number(input.value);
        markDirty(type,key);
      }));
    });
  });

  editor.querySelector('#btn-add-habilidade')?.addEventListener('click', () => { entity.habilidades.push({ nome:'', grimorio:'', nivel:'', descricao:'' }); markDirty(type,key); rerender(); });
  editor.querySelectorAll('.habilidade-item').forEach((hEl) => {
    const hi = Number(hEl.dataset.hi);
    const h = entity.habilidades[hi];
    hEl.querySelectorAll('summary button').forEach((b) => b.addEventListener('click', (ev) => {
      ev.preventDefault();
      const act = b.dataset.act;
      if (act === 'del') entity.habilidades.splice(hi,1);
      if (act === 'up' && hi > 0) [entity.habilidades[hi-1], entity.habilidades[hi]] = [entity.habilidades[hi], entity.habilidades[hi-1]];
      if (act === 'down' && hi < entity.habilidades.length -1) [entity.habilidades[hi+1], entity.habilidades[hi]] = [entity.habilidades[hi], entity.habilidades[hi+1]];
      markDirty(type,key); rerender();
    }));
    hEl.querySelectorAll('[data-hf]').forEach((i) => i.addEventListener('input', () => {
      const f = i.dataset.hf;
      if (f === 'efeitos') { h.efeitos = i.value.split(',').map((x)=>x.trim()).filter(Boolean); }
      else if (f === 'calcAtributo') { h.calculoDano = h.calculoDano || {}; h.calculoDano.atributo = i.value; if (!i.value) delete h.calculoDano; rerender(); }
      else if (f === 'calcPericia') { h.calculoDano = h.calculoDano || {}; h.calculoDano.pericia = i.value; }
      else h[f] = i.value;
      markDirty(type,key);
    }));
    hEl.querySelector('.btn-add-subataque')?.addEventListener('click', () => { h.subataques = h.subataques || []; h.subataques.push({ nome:'', descricao:'' }); markDirty(type,key); rerender(); });
    hEl.querySelectorAll('.subataque-item').forEach((sEl) => {
      const si = Number(sEl.dataset.si);
      const s = h.subataques[si];
      sEl.querySelector('.btn-remove-subataque')?.addEventListener('click', () => { h.subataques.splice(si,1); markDirty(type,key); rerender(); });
      sEl.querySelectorAll('[data-sf]').forEach((inp) => inp.addEventListener('input', () => {
        const f = inp.dataset.sf;
        if (f === 'efeitos') s.efeitos = inp.value.includes(',') ? inp.value.split(',').map((x)=>x.trim()).filter(Boolean) : inp.value;
        else if (f === 'calcAtributo') { s.calculoDano = s.calculoDano || {}; s.calculoDano.atributo = inp.value; if (!inp.value) delete s.calculoDano; }
        else if (f === 'calcPericia') { s.calculoDano = s.calculoDano || {}; s.calculoDano.pericia = inp.value; }
        else s[f] = inp.value;
        markDirty(type,key);
      }));
    });
  });

  updatePvDisplay();
}

function renderPasswords() {
  const panel = document.getElementById('tab-passwords');
  const table = (kind, title) => {
    const entries = Object.entries(state.passwords[kind]);
    return `<h2>${title}</h2><table><thead><tr><th>Personagem</th><th>Nova Senha</th><th></th></tr></thead><tbody>${entries.map(([hashValue,name]) => `<tr data-kind="${kind}" data-name="${name}" data-hash="${hashValue}"><td>${name}</td><td><input type="text" class="new-password-input"></td><td><button class="btn-save-password">Salvar</button><span class="saved-tag">✓ Salvo</span></td></tr>`).join('')}</tbody></table>`;
  };
  panel.innerHTML = `<section class="passwords-section">${table('players','Senhas dos Personagens')}${table('npcs','Senhas dos NPCs')}</section>`;
  panel.querySelectorAll('.btn-save-password').forEach((btn) => btn.addEventListener('click', async () => {
    const tr = btn.closest('tr');
    const kind = tr.dataset.kind;
    const name = tr.dataset.name;
    const input = tr.querySelector('.new-password-input');
    const plain = input.value.trim();
    if (!plain) return;
    const newHash = await hash(plain);
    const map = state.passwords[kind];
    Object.keys(map).forEach((h) => { if (map[h] === name) delete map[h]; });
    map[newHash] = name;
    input.value = '';
    const tag = tr.querySelector('.saved-tag');
    tag.classList.add('show');
    setTimeout(() => tag.classList.remove('show'), 2000);
    renderPasswords();
  }));
}

`function normalizarArquetipo(arquetipo = '') {

function exportPasswordsJs() {
  const p = Object.entries(state.passwords.players).map(([h,n])=>`        "${h}": "${n}"`).join(',\n');
  const n = Object.entries(state.passwords.npcs).map(([h,name])=>`        "${h}": "${name}"`).join(',\n');
  return `(function () {
    const PLAYER_PASSWORD_MAP = {
${p}
    };

    const NPC_PASSWORD_MAP = {
${n}
    };

    const toHashList = (passwordMap) => Object.keys(passwordMap);

    const normalizePassword = (text = '') =>
        text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

    const hashPassword = async (text) => {
        const bytes = new TextEncoder().encode(text);
        const hashBuffer = await crypto.subtle.digest('SHA-256', bytes);
        return Array.from(new Uint8Array(hashBuffer))
            .map((b) => b.toString(16).padStart(2, '0'))
            .join('');
    };

    window.PASSWORDS = {
        players: {
            map: PLAYER_PASSWORD_MAP,
            hashes: toHashList(PLAYER_PASSWORD_MAP),
        },
        npcs: {
            map: NPC_PASSWORD_MAP,
            hashes: toHashList(NPC_PASSWORD_MAP),
        },
        normalizePassword,
        hashPassword,
    };
})();`;
}
