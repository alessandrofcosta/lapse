<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Lapse</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;700&display=swap');
    :root {
      --bg-overlay: rgba(8, 10, 19, 0.78);
      --panel: rgba(17, 22, 38, 0.86);
      --panel-border: rgba(225, 188, 99, 0.45);
      --text-main: #f5f2e8;
      --text-soft: #c4bba2;
      --accent: #e1bc63;
      --accent-2: #7a5b23;
      --danger: #ff8a8a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('../../media/background/lapse-background-4.png') center/cover fixed;
      padding: 16px;
    }
    .login-wrap { width: min(460px, 100%); }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 35px rgba(0,0,0,.4);
    }
    h1 {
      margin: 0 0 14px;
      font-family: 'Cinzel', serif;
      color: var(--accent);
      font-size: 1.65rem;
      text-align: center;
    }
    p { color: var(--text-soft); text-align: center; margin: 0 0 18px; }
    input[type="password"], button {
      width: 100%;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
    }
    input[type="password"] {
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(4,8,18,.7);
      color: var(--text-main);
    }
    .show-password { display: flex; align-items: center; gap: 8px; margin: 12px 0; color: var(--text-soft); }
    button {
      border: 0;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      color: #1a1208;
      background: linear-gradient(180deg, #efce7f 0%, #c89940 100%);
    }
    .error {
      display: none;
      margin-top: 10px;
      color: var(--danger);
      font-weight: 700;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>Admin — Lapse</h1>
      <p>Digite a senha administrativa para acessar o painel.</p>
      <form id="admin-login-form">
        <input type="password" id="admin-password" placeholder="Digite a senha" required>
        <div class="show-password">
          <input type="checkbox" id="show-password">
          <label for="show-password">Mostrar senha</label>
        </div>
        <button type="submit">Entrar</button>
        <p id="login-error" class="error">Senha incorreta.</p>
      </form>
    </div>
  </div>

  <script>
    const ADMIN_HASH = 'd1fe44a93e8d52c5b72e2fb1def86c824dd661e59740538c58378c0b63d4321f';

    const normalize = (s = '') => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
    const hashText = async (s) => {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(normalize(s)));
      return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, '0')).join('');
    };

    const form = document.getElementById('admin-login-form');
    const passwordInput = document.getElementById('admin-password');
    const showPassword = document.getElementById('show-password');
    const loginError = document.getElementById('login-error');

    showPassword.addEventListener('change', () => {
      passwordInput.type = showPassword.checked ? 'text' : 'password';
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      loginError.style.display = 'none';
      const currentHash = await hashText(passwordInput.value);
      if (currentHash === ADMIN_HASH) {
        sessionStorage.setItem('adminLogado', 'true');
        window.location.href = 'painel.html';
        return;
      }
      loginError.style.display = 'block';
    });
  </script>
</body>
</html>
